<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxygen Flow Interactive Simulator (Dual Main Logic)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .header { 
            text-align: center; 
            width: 100%; 
            max-width: 1280px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }
        .subtitle { 
            color: #1e3a8a; 
            font-weight: 600; 
            margin-top: 5px; 
            font-size: 14px; 
            background: #dbeafe; 
            padding: 6px 12px; 
            border-radius: 20px; 
            display: inline-block; 
        }
        #mynetwork { 
            width: 1280px; 
            height: 720px; 
            background-color: #ffffff; 
            border: 4px solid #1e293b; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); 
        }
        .btn-save { 
            background-color: #0f172a; 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: 'Prompt', sans-serif; 
            font-weight: 600; 
            font-size: 16px; 
            transition: 0.2s; 
        }
        .btn-save:hover { background-color: #334155; }
        .legend { 
            margin-top: 20px; 
            display: flex; 
            gap: 20px; 
            background: white; 
            padding: 12px 24px; 
            border-radius: 30px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
        }
        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px; 
            color: #334155; 
        }
        .pipe-sample { width: 40px; height: 8px; border-radius: 4px; }
        /* ปรับฟอนต์สำหรับกล่องเครื่องมือ (Tooltip) ที่มีปุ่มกด */
        .vis-tooltip { font-family: 'Prompt', sans-serif !important; }
    </style>
</head>
<body>

    <div class="header">
        <div style="text-align: left;">
            <h1 style="margin: 0; color: #0f172a;">Medical Oxygen Flow Interactive Simulator</h1>
            <p style="margin: 0; color: #475569;">ระบบจำลองโครงข่ายออกซิเจน (รองรับระบบหลัก 2 เส้นทาง)</p>
            <div class="subtitle">เอาเมาส์ชี้ที่วาล์วแล้วคลิกปุ่มเพื่อจำลองการตัดต่อระบบก๊าซ</div>
        </div>
        <button class="btn-save" onclick="saveImage()">📸 บันทึกเป็นรูปภาพ</button>
    </div>

    <div id="mynetwork"></div>

    <div class="legend">
        <div class="legend-item"><div class="pipe-sample" style="background:#3b82f6;"></div> ท่อหลัก (มีก๊าซ)</div>
        <div class="legend-item"><div class="pipe-sample" style="background:#cbd5e1; height:4px;"></div> ท่อที่ไม่มีแรงดันก๊าซ</div>
        <div class="legend-item"><div class="pipe-sample" style="background:#f97316; border: 1px dashed #ea580c;"></div> ท่อสำรอง (กำลังจ่ายทดแทน)</div>
        <div class="legend-item"><div style="width:14px; height:14px; border-radius:4px; background:#e2e8f0; border:2px solid #64748b;"></div> วาล์วปกติ</div>
        <div class="legend-item"><div style="width:14px; height:14px; border-radius:4px; background:#ef4444; border:2px solid #991b1b;"></div> วาล์วที่ถูกสั่งปิด</div>
    </div>

    <script type="text/javascript">
        // ⚠️ นำ URL ของ Web App จาก Google Apps Script มาใส่ในเครื่องหมายคำพูดด้านล่าง
        const API_URL = 'https://script.google.com/macros/s/AKfycbzd52XAP_sZVxGrdU8iipkFyZIcsJgDOysLSfZ3e-s2bZPxoqEOkbL9E-rVLwW3Z7y1/exec';
        
        let network = null;
        let nodesData = []; 
        let linksData = []; 
        let nodesDataset = new vis.DataSet();
        let edgesDataset = new vis.DataSet();

        async function initDiagram() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                nodesData = data.nodes;
                linksData = data.links;

                const container = document.getElementById('mynetwork');
                const options = {
                    layout: { 
                        hierarchical: { 
                            direction: 'LR', 
                            sortMethod: 'directed', 
                            levelSeparation: 260, 
                            nodeSpacing: 140 
                        } 
                    },
                    physics: false,
                    interaction: { hover: true, dragNodes: true, selectable: true }
                };
                network = new vis.Network(container, { nodes: nodesDataset, edges: edgesDataset }, options);

                // เริ่มคำนวณการไหลครั้งแรกเมื่อโหลดข้อมูลเสร็จ
                calculateFlow();

                // ฟังก์ชันสำหรับรับคำสั่งจากปุ่มเปิด/ปิดใน Tooltip
                window.toggleValve = function(nodeId) {
                    let idx = nodesData.findIndex(n => n.id === nodeId);
                    if (idx !== -1) {
                        nodesData[idx].status = nodesData[idx].status === 'ปิด' ? 'เปิด' : 'ปิด';
                        calculateFlow(); // เมื่อเปลี่ยนสถานะ ให้คำนวณโครงข่ายใหม่ทั้งหมด
                    }
                };

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('mynetwork').innerHTML = '<div style="padding: 20px; color: red; font-size: 18px; text-align: center; margin-top: 50px;">ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบ URL ของ Google Apps Script</div>';
            }
        }

        // 🧠 Core Logic: คำนวณการไหลตามเงื่อนไข Dual-Main Redundancy
        function calculateFlow() {
            let nodesWithPrimaryGas = new Set(); // เก็บจุดที่ระบบหลักวิ่งไปถึง
            let activeEdges = new Set();         // เก็บเส้นท่อที่มีก๊าซไหลผ่านจริง

            // รีเซ็ตสถานะทุกจุดให้เป็น 'ไม่มีก๊าซ' ชั่วคราว (ยกเว้นวาล์วที่จะเก็บสถานะ เปิด/ปิด ของตัวเองไว้)
            nodesData.forEach(n => { if(n.type !== 'valve') n.tempStatus = 'ไม่มีก๊าซ'; });

            // ขั้นตอนที่ 1: ตรวจสอบการไหลของระบบหลัก (Primary System)
            let queue = [];
            nodesData.filter(n => n.type === 'source').forEach(n => {
                n.tempStatus = 'ปกติ';
                nodesWithPrimaryGas.add(n.id);
                queue.push(n.id);
            });

            while(queue.length > 0) {
                let currId = queue.shift();
                let currNode = nodesData.find(n => n.id === currId);

                // หากวาล์วตัวนี้ถูกกดเป็น "ปิด" ก๊าซหลักจะไหลผ่านไปไม่ได้ หยุดการสำรวจเส้นทางย่อยนี้
                if (currNode.type === 'valve' && currNode.status === 'ปิด') continue;

                // ตามรอยเส้นทางท่อหลักที่ออกจากจุดนี้
                let outgoingLinks = linksData.filter(l => l.from === currId && l.line_type === 'primary');
                outgoingLinks.forEach(link => {
                    activeEdges.add(link.from + '_' + link.to); // เปิดใช้งานท่อเส้นนี้
                    if (!nodesWithPrimaryGas.has(link.to)) {
                        nodesWithPrimaryGas.add(link.to);
                        let targetNode = nodesData.find(n => n.id === link.to);
                        if (targetNode && targetNode.type !== 'valve') targetNode.tempStatus = 'ปกติ';
                        queue.push(link.to);
                    }
                });
            }

            // ขั้นตอนที่ 2: ตรวจสอบเงื่อนไขระบบสำรอง (Backup Logic)
            nodesData.filter(n => n.type === 'backup').forEach(backupNode => {
                backupNode.tempStatus = 'Standby Ready'; // ค่าตั้งต้นคือเตรียมพร้อม
                
                let outgoingBackupLinks = linksData.filter(l => l.from === backupNode.id && l.line_type === 'backup');
                
                outgoingBackupLinks.forEach(link => {
                    // 🚨 เงื่อนไข: ถ้าระบบหลักทั้งคู่ส่งไปไม่ถึงปลายทางเลย (ปลายทางไม่อยู่ในเซ็ต nodesWithPrimaryGas)
                    if (!nodesWithPrimaryGas.has(link.to)) {
                        backupNode.tempStatus = '⚡ กำลังจ่ายก๊าซสำรอง';
                        activeEdges.add(link.from + '_' + link.to); // เปิดใช้งานท่อสำรอง
                        
                        let targetNode = nodesData.find(n => n.id === link.to);
                        // เปลี่ยนสถานะปลายทางเป็นใช้ระบบสำรอง (ครอบคลุมทุกขนาดอาคาร)
                        if (targetNode) targetNode.tempStatus = '⚠️ ใช้ระบบก๊าซสำรอง'; 
                    }
                });
            });

            // อัปเดตข้อมูลขึ้นหน้าจอ
            renderUpdate(nodesWithPrimaryGas, activeEdges);
        }

        // ฟังก์ชันกำหนดการแสดงผลกราฟิก
        function renderUpdate(nodesWithPrimaryGas, activeEdges) {
            let visNodes = nodesData.map(n => {
                let displayStatus = n.tempStatus;
                
                // เช็คว่าจุดนี้มีก๊าซเข้าหรือไม่ (จากระบบหลัก หรือ ระบบสำรองทำงานอยู่)
                let hasGas = nodesWithPrimaryGas.has(n.id) || displayStatus.includes('สำรอง') || displayStatus.includes('กำลังจ่าย');
                let labelText = ``;

                if (n.type === 'valve') {
                    displayStatus = n.status || 'เปิด';
                    labelText = `📌 ${n.label}\nสถานะ: [ ${displayStatus} ]\n\n(ชี้เพื่อสลับสถานะ)`;
                } else {
                    labelText = `🏢 ${n.label}\n[ ${displayStatus} ]`;
                }

                let style = getNodeStyle(n.type, displayStatus, hasGas);
                
                return {
                    id: n.id,
                    label: labelText,
                    level: n.level,
                    shape: 'box',
                    margin: 12,
                    // ฝังปุ่ม HTML ลงไปใน Tooltip (แสดงผลเมื่อเอาเมาส์ชี้)
                    title: n.type === 'valve' ? `<button onclick="window.toggleValve('${n.id}')" style="font-family:'Prompt'; padding:8px 16px; cursor:pointer; font-weight:bold; background:#1e293b; color:white; border:none; border-radius:6px; margin: 5px;">คลิกสลับสถานะ วาล์ว</button>` : undefined,
                    font: { face: 'Prompt', color: style.font, size: 15, multi: true },
                    color: { background: style.bg, border: style.border },
                    borderWidth: 2
                };
            });

            let visEdges = linksData.map(l => {
                let isActive = activeEdges.has(l.from + '_' + l.to);
                let isBackup = l.line_type === 'backup';
                
                // กำหนดสีและขนาดท่อ (น้ำเงิน=หลัก, ส้ม=สำรอง, เทาลีบ=ไม่มีก๊าซ)
                let edgeColor = isActive ? (isBackup ? '#f97316' : '#3b82f6') : '#cbd5e1';
                
                return {
                    id: l.from + '_' + l.to,
                    from: l.from, to: l.to,
                    width: isActive ? 12 : 4,
                    color: { color: edgeColor, opacity: isActive ? 1 : 0.3 },
                    arrows: 'to',
                    dashes: isBackup,
                    smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.6 }
                };
            });

            nodesDataset.update(visNodes);
            edgesDataset.update(visEdges);
        }

        // ฟังก์ชันจัดการสีโหนดตามสถานะความปลอดภัย
        function getNodeStyle(type, status, hasGas) {
            if (type === 'valve') {
                return status === 'ปิด' 
                    ? { bg: '#fee2e2', font: '#991b1b', border: '#ef4444' } 
                    : { bg: '#fef08a', font: '#854d0e', border: '#eab308' };
            }
            if (!hasGas && type !== 'source' && type !== 'backup') {
                return { bg: '#ef4444', font: '#ffffff', border: '#7f1d1d' }; // แดง (ล่ม)
            }
            if (status.includes('สำรอง') || status.includes('กำลังจ่าย')) {
                return { bg: '#ffedd5', font: '#ea580c', border: '#f97316' }; // ส้ม (สำรอง)
            }
            if (type === 'backup' && status === 'Standby Ready') {
                return { bg: '#f1f5f9', font: '#475569', border: '#94a3b8' }; // เทา (เตรียมพร้อม)
            }
            return type === 'source' 
                ? { bg: '#dbeafe', font: '#1e40af', border: '#3b82f6' } // ฟ้า (ต้นทางหลัก)
                : { bg: '#d1fae5', font: '#065f46', border: '#10b981' }; // เขียว (ทำงานปกติ)
        }

        // ฟังก์ชันบันทึกภาพหน้าจอ
        function saveImage() {
            const canvas = document.querySelector('#mynetwork canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `O2-Flow-Architecture-${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } else {
                alert("เกิดข้อผิดพลาด ไม่พบแผนผังสำหรับบันทึกภาพ");
            }
        }

        window.onload = initDiagram;
    </script>
</body>
</html>
