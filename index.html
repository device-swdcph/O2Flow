<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxygen Flow Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; width: 100%; max-width: 1280px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .subtitle { color: #059669; font-weight: 600; margin-top: 5px; font-size: 14px; background: #d1fae5; padding: 5px 10px; border-radius: 5px; display: inline-block; }
        #mynetwork { width: 1280px; height: 720px; background-color: #ffffff; border: 4px solid #334155; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: default; }
        .btn-save { background-color: #0f172a; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Prompt', sans-serif; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .btn-save:hover { background-color: #334155; }
        .legend { margin-top: 20px; display: flex; gap: 20px; background: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .pipe-sample { width: 40px; height: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="text-align: left;">
            <h1 style="margin: 0; color: #1e293b;">O2 Flow Simulator</h1>
            <p style="margin: 0; color: #64748b;">แผนผังจำลองวิศวกรรมระบบท่อออกซิเจน</p>
            <div class="subtitle">👆 ทดลองคลิกที่ "วาล์ว" เพื่อจำลองการตัดต่อระบบก๊าซ</div>
        </div>
        <button class="btn-save" onclick="saveImage()">📸 บันทึกเป็นรูปภาพ</button>
    </div>

    <div id="mynetwork"></div>

    <div class="legend">
        <div class="legend-item"><div class="pipe-sample" style="background:#2563eb;"></div> ท่อหลัก (กำลังจ่าย)</div>
        <div class="legend-item"><div class="pipe-sample" style="background:#94a3b8; height:4px;"></div> ท่อที่ไม่มีก๊าซ</div>
        <div class="legend-item"><div class="pipe-sample" style="background:#f59e0b; border: 1px dashed #d97706;"></div> ระบบสำรองทำงาน</div>
        <div class="legend-item"><div style="width:15px; height:15px; border-radius:50%; background:#facc15; border:1px solid #000;"></div> วาล์ว (คลิกได้)</div>
        <div class="legend-item"><div class="pipe-sample" style="background:#ef4444;"></div> จุดที่ก๊าซไม่ถึง / ล่ม</div>
    </div>

    <script type="text/javascript">
        // ⚠️ เปลี่ยน URL เป็นของคุณ
        const API_URL = 'https://script.google.com/macros/s/AKfycbzd52XAP_sZVxGrdU8iipkFyZIcsJgDOysLSfZ3e-s2bZPxoqEOkbL9E-rVLwW3Z7y1/exec';
        
        let network = null;
        let nodesData = []; // เก็บข้อมูลโหนดต้นฉบับ
        let linksData = []; // เก็บข้อมูลเส้นทางต้นฉบับ
        let nodesDataset = new vis.DataSet();
        let edgesDataset = new vis.DataSet();

        async function initDiagram() {
            try {
                // 1. โหลดข้อมูลจาก Google Sheets ครั้งแรก
                const response = await fetch(API_URL);
                const data = await response.json();
                nodesData = data.nodes;
                linksData = data.links;

                // 2. ตั้งค่าเครือข่าย
                const container = document.getElementById('mynetwork');
                const options = {
                    layout: { hierarchical: { direction: 'LR', sortMethod: 'directed', levelSeparation: 300, nodeSpacing: 150 } },
                    physics: false,
                    interaction: { hover: true, dragNodes: true }
                };
                network = new vis.Network(container, { nodes: nodesDataset, edges: edgesDataset }, options);

                // 3. เริ่มคำนวณการไหลของก๊าซ
                calculateFlow();

                // 4. ดักจับเหตุการณ์การ "คลิก" ที่โหนด
                network.on("click", function (params) {
                    if (params.nodes.length > 0) {
                        let clickedNodeId = params.nodes[0];
                        let nodeIndex = nodesData.findIndex(n => n.id === clickedNodeId);
                        
                        // ถ้าสิ่งที่คลิกคือ "วาล์ว" ให้สลับสถานะ
                        if (nodeIndex !== -1 && nodesData[nodeIndex].type === 'valve') {
                            let currentStatus = nodesData[nodeIndex].status;
                            nodesData[nodeIndex].status = (currentStatus === 'เปิด' || currentStatus === 'ปกติ') ? 'ปิด' : 'เปิด';
                            
                            // คำนวณระบบก๊าซใหม่ทั้งหมด
                            calculateFlow();
                        }
                    }
                });

            } catch (error) {
                document.getElementById('mynetwork').innerHTML = '<div style="padding: 20px; color: red; text-align: center;">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</div>';
            }
        }

        // 🧠 ฟังก์ชันสมองกล: คำนวณเส้นทางก๊าซและระบบสำรองอัตโนมัติ
        function calculateFlow() {
            let activeNodes = new Set(); // เก็บ ID ของจุดที่มีก๊าซไหลไปถึง
            let activeEdges = new Set(); // เก็บ ID ของเส้นท่อที่มีก๊าซ
            
            // รีเซ็ตสถานะชั่วคราว
            nodesData.forEach(n => { n.tempStatus = 'ไม่มีก๊าซ'; });

            // สเตป 1: ปล่อยก๊าซจากถังหลัก (Source) วิ่งไปตามท่อ Primary
            let queue = [];
            nodesData.filter(n => n.type === 'source').forEach(n => {
                n.tempStatus = 'ปกติ';
                activeNodes.add(n.id);
                queue.push(n.id);
            });

            while(queue.length > 0) {
                let currId = queue.shift();
                let currNode = nodesData.find(n => n.id === currId);

                // ถ้าวาล์วถูก "ปิด" ก๊าซจะหยุดตรงนี้ ไม่ไหลต่อ
                if (currNode.type === 'valve' && currNode.status === 'ปิด') continue;

                // หาเส้นทางที่ออกจากจุดนี้ (เฉพาะท่อหลัก)
                let outgoingLinks = linksData.filter(l => l.from === currId && l.line_type === 'primary');
                outgoingLinks.forEach(link => {
                    activeEdges.add(link.from + '_' + link.to);
                    if (!activeNodes.has(link.to)) {
                        activeNodes.add(link.to);
                        let targetNode = nodesData.find(n => n.id === link.to);
                        if (targetNode.type !== 'valve') targetNode.tempStatus = 'ปกติ';
                        queue.push(link.to);
                    }
                });
            }

            // สเตป 2: ตรวจสอบว่าระบบหลักล่มไหม ถ้าล่มให้เปิดระบบสำรอง (Backup)
            nodesData.filter(n => n.type === 'backup').forEach(backupNode => {
                backupNode.tempStatus = 'Standby'; // ค่าเริ่มต้นของถังสำรอง
                
                let outgoingBackupLinks = linksData.filter(l => l.from === backupNode.id && l.line_type === 'backup');
                let backupTriggered = false;

                outgoingBackupLinks.forEach(link => {
                    // ถ้าเป้าหมาย (เช่น ตึกคลอด) ไม่มีก๊าซจากระบบหลักไปถึง
                    if (!activeNodes.has(link.to)) {
                        backupTriggered = true;
                        activeEdges.add(link.from + '_' + link.to); // เปิดท่อสำรอง
                        activeNodes.add(link.to);
                        
                        let targetNode = nodesData.find(n => n.id === link.to);
                        if (targetNode) targetNode.tempStatus = 'ใช้ระบบสำรอง';
                    }
                });

                if (backupTriggered) {
                    backupNode.tempStatus = 'กำลังจ่ายก๊าซ'; // เปลี่ยนสถานะถังสำรอง
                    activeNodes.add(backupNode.id);
                }
            });

            // อัปเดตกราฟิกขึ้นหน้าจอ
            renderUpdate(activeNodes, activeEdges);
        }

        // ฟังก์ชันวาดกราฟิก (สีท่อ, สีโหนด) ตามข้อมูลที่คำนวณได้
        function renderUpdate(activeNodes, activeEdges) {
            let visNodes = nodesData.map(n => {
                let displayStatus = n.tempStatus;
                let hasFlow = activeNodes.has(n.id);
                
                // ถือสิทธิ์สถานะของวาล์วที่ผู้ใช้คลิก
                if (n.type === 'valve') displayStatus = n.status;

                let style = getNodeStyle(n.type, displayStatus, hasFlow);
                
                return {
                    id: n.id,
                    label: ` ${n.label} \n[${displayStatus}] `,
                    level: n.level,
                    shape: n.type === 'valve' ? 'dot' : 'box',
                    size: n.type === 'valve' ? 25 : undefined,
                    font: { face: 'Prompt', color: style.font, size: 16 },
                    color: { background: style.bg, border: style.border },
                    borderWidth: (n.type === 'valve' && displayStatus === 'ปิด') ? 4 : 2,
                    shadow: n.type === 'valve' // เพิ่มเงาให้วาล์วดูเหมือนปุ่มกดได้
                };
            });

            let visEdges = linksData.map(l => {
                let isActive = activeEdges.has(l.from + '_' + l.to);
                let isBackup = l.line_type === 'backup';
                
                // กำหนดสีและความหนาของท่อ (ท่อไม่มีก๊าซจะลีบและเป็นสีเทา)
                let edgeColor = isActive ? (isBackup ? '#f59e0b' : '#3b82f6') : '#cbd5e1';
                
                return {
                    id: l.from + '_' + l.to,
                    from: l.from, to: l.to,
                    width: isActive ? 12 : 4,
                    color: { color: edgeColor, opacity: isActive ? 1 : 0.4 },
                    arrows: 'to',
                    dashes: isBackup,
                    smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.5 }
                };
            });

            nodesDataset.update(visNodes);
            edgesDataset.update(visEdges);
        }

        // จัดการเรื่องสีตามเงื่อนไข
        function getNodeStyle(type, status, hasFlow) {
            if (type === 'valve') {
                return status === 'ปิด' 
                    ? { bg: '#ef4444', font: '#ffffff', border: '#7f1d1d' } 
                    : { bg: '#facc15', font: '#000000', border: '#854d0e' };
            }
            if (!hasFlow && type !== 'source' && type !== 'backup') {
                return { bg: '#ef4444', font: '#ffffff', border: '#991b1b' }; // แดง = ล่ม/ก๊าซไม่ถึง
            }
            if (status === 'ใช้ระบบสำรอง' || status === 'กำลังจ่ายก๊าซ') {
                return { bg: '#f97316', font: '#ffffff', border: '#9a3412' }; // ส้ม = สำรอง
            }
            if (type === 'backup' && status === 'Standby') {
                return { bg: '#94a3b8', font: '#ffffff', border: '#475569' }; // เทา = ถังสำรองที่รอใช้งาน
            }
            return type === 'source' 
                ? { bg: '#2563eb', font: '#ffffff', border: '#1e3a8a' } // ฟ้า = ต้นทาง
                : { bg: '#22c55e', font: '#ffffff', border: '#14532d' }; // เขียว = ปลายทางทำงานปกติ
        }

        function saveImage() {
            const canvas = document.querySelector('#mynetwork canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `O2-Simulator-${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        }

        window.onload = initDiagram;
    </script>
</body>
</html>
