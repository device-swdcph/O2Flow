<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxygen Flow Interactive Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; width: 100%; max-width: 1280px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .subtitle { color: #1e3a8a; font-weight: 600; margin-top: 5px; font-size: 14px; background: #dbeafe; padding: 6px 12px; border-radius: 20px; display: inline-block; }
        
        .network-wrapper {
            position: relative;
            width: 1280px; 
            height: 720px;
            background-color: #ffffff; 
            border: 4px solid #1e293b; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); 
        }
        #mynetwork { width: 100%; height: 100%; border-radius: 12px; }

        #valve-controls-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; 
            overflow: hidden;
            border-radius: 12px;
        }

        .valve-btn-group {
            position: absolute;
            transform: translate(-50%, 20px); 
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            pointer-events: auto; 
            z-index: 10;
        }
        .v-btn {
            font-family: 'Prompt', sans-serif;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #cbd5e1;
            background: #f1f5f9;
            color: #475569;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .v-btn:hover { background: #e2e8f0; }
        .v-btn.btn-on.active { background: #22c55e; color: white; border-color: #16a34a; }
        .v-btn.btn-off.active { background: #ef4444; color: white; border-color: #dc2626; }

        .btn-save { background-color: #0f172a; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Prompt', sans-serif; font-weight: 600; font-size: 16px; transition: 0.2s; }
        .btn-save:hover { background-color: #334155; }
        .legend { margin-top: 20px; display: flex; gap: 20px; background: white; padding: 12px 24px; border-radius: 30px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #334155; }
        .pipe-sample { width: 40px; height: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="text-align: left;">
            <h1 style="margin: 0; color: #0f172a;">Medical Oxygen Flow Simulator</h1>
            <p style="margin: 0; color: #475569;">ระบบจำลองโครงข่ายออกซิเจน (Full Control Simulation)</p>
            <div class="subtitle">👉 กดปุ่ม [เปิด] / [ปิด] ที่จุดใดก็ได้ (Source, Valve, Main) เพื่อจำลองสถานการณ์</div>
        </div>
        <button class="btn-save" onclick="saveImage()">📸 บันทึกเป็นรูปภาพ</button>
    </div>

    <div class="network-wrapper">
        <div id="mynetwork"></div>
        <div id="valve-controls-layer"></div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="pipe-sample" style="background:#3b82f6;"></div> ท่อหลัก (มีก๊าซ)</div>
        <div class="legend-item"><div class="pipe-sample" style="background:#cbd5e1; height:4px;"></div> ท่อที่ไม่มีก๊าซ</div>
        <div class="legend-item"><div class="pipe-sample" style="background:#f97316; border: 1px dashed #ea580c;"></div> ท่อสำรอง (กำลังจ่ายทดแทน)</div>
        <div class="legend-item"><div style="width:14px; height:14px; border-radius:4px; background:#e2e8f0; border:2px solid #64748b;"></div> เปิดปกติ</div>
        <div class="legend-item"><div style="width:14px; height:14px; border-radius:4px; background:#ef4444; border:2px solid #991b1b;"></div> ถูกสั่งปิด / ก๊าซไปไม่ถึง</div>
    </div>

    <script type="text/javascript">
        // ⚠️ วาง URL Web App ของ Google Apps Script ที่นี่
        const API_URL = 'https://script.google.com/macros/s/AKfycbzd52XAP_sZVxGrdU8iipkFyZIcsJgDOysLSfZ3e-s2bZPxoqEOkbL9E-rVLwW3Z7y1/exec';
        
        let network = null;
        let nodesData = []; 
        let linksData = []; 
        let nodesDataset = new vis.DataSet();
        let edgesDataset = new vis.DataSet();
        
        let valveButtonsMap = {}; 

        async function initDiagram() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                nodesData = data.nodes;
                linksData = data.links;

                const container = document.getElementById('mynetwork');
                const options = {
                    layout: { hierarchical: { direction: 'LR', sortMethod: 'directed', levelSeparation: 260, nodeSpacing: 160 } },
                    physics: false,
                    interaction: { hover: true, dragNodes: true, selectable: true }
                };
                network = new vis.Network(container, { nodes: nodesDataset, edges: edgesDataset }, options);

                buildButtonsHTML();
                calculateFlow();

                network.on("afterDrawing", updateButtonPositions);
                network.on("zoom", updateButtonPositions);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('mynetwork').innerHTML = '<div style="padding:20px;color:red;text-align:center;">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</div>';
            }
        }

        // ฟังก์ชันสร้างปุ่มให้โหนดทุกประเภทยกเว้น Backup
        function buildButtonsHTML() {
            const layer = document.getElementById('valve-controls-layer');
            layer.innerHTML = '';
            valveButtonsMap = {};

            nodesData.forEach(n => {
                if (n.type !== 'backup') { // ใส่ปุ่มให้ Source, Valve, Main Flow
                    let div = document.createElement('div');
                    div.className = 'valve-btn-group';
                    
                    let btnOn = document.createElement('button');
                    btnOn.className = `v-btn btn-on ${n.status !== 'ปิด' ? 'active' : ''}`;
                    btnOn.innerText = 'เปิด';
                    btnOn.onclick = () => window.setValve(n.id, 'เปิด');
                    
                    let btnOff = document.createElement('button');
                    btnOff.className = `v-btn btn-off ${n.status === 'ปิด' ? 'active' : ''}`;
                    btnOff.innerText = 'ปิด';
                    btnOff.onclick = () => window.setValve(n.id, 'ปิด');
                    
                    div.appendChild(btnOn);
                    div.appendChild(btnOff);
                    layer.appendChild(div);
                    
                    valveButtonsMap[n.id] = { div: div, btnOn: btnOn, btnOff: btnOff };
                }
            });
        }

        function updateButtonPositions() {
            if (!network) return;
            let positions = network.getPositions();
            for (let id in valveButtonsMap) {
                if (positions[id]) {
                    let domPos = network.canvasToDOM(positions[id]);
                    let controls = valveButtonsMap[id];
                    controls.div.style.left = domPos.x + 'px';
                    controls.div.style.top = (domPos.y + 25) + 'px'; 
                }
            }
        }

        window.setValve = function(nodeId, newStatus) {
            let idx = nodesData.findIndex(n => n.id === nodeId);
            if (idx !== -1) {
                nodesData[idx].status = newStatus;
                
                let ctrls = valveButtonsMap[nodeId];
                if (ctrls) {
                    if (newStatus === 'เปิด') {
                        ctrls.btnOn.classList.add('active');
                        ctrls.btnOff.classList.remove('active');
                    } else {
                        ctrls.btnOn.classList.remove('active');
                        ctrls.btnOff.classList.add('active');
                    }
                }
                
                calculateFlow();
            }
        };

        // 🧠 Core Logic: วิเคราะห์การไหล
        function calculateFlow() {
            let nodesWithPrimaryGas = new Set();
            let activeEdges = new Set();

            // รีเซ็ตสถานะ
            nodesData.forEach(n => { 
                if (n.type === 'backup') {
                    n.tempStatus = 'Standby Ready'; // ถังสำรองจะไม่แสดงคำว่า "ไม่มีก๊าซ" เด็ดขาด
                } else if (n.status === 'ปิด') {
                    n.tempStatus = 'ปิด'; // ถ้าผู้ใช้กดปุ่มปิด ก็ให้แสดงสถานะว่าถูกปิด
                } else {
                    n.tempStatus = 'ไม่มีก๊าซ'; 
                }
            });

            // Step 1: วิ่งเส้นทางระบบหลัก (เริ่มจาก Source ที่เปิดอยู่เท่านั้น)
            let queue = [];
            nodesData.filter(n => n.type === 'source' && n.status !== 'ปิด').forEach(n => {
                n.tempStatus = 'ปกติ';
                nodesWithPrimaryGas.add(n.id);
                queue.push(n.id);
            });

            while(queue.length > 0) {
                let currId = queue.shift();
                let currNode = nodesData.find(n => n.id === currId);

                // ถ้าระหว่างทางเจอกล่องไหนโดนกด "ปิด" เอาไว้ ให้หยุดส่งก๊าซไปเส้นนั้นทันที
                if (currNode.status === 'ปิด') continue;

                let outgoingLinks = linksData.filter(l => l.from === currId && l.line_type === 'primary');
                outgoingLinks.forEach(link => {
                    activeEdges.add(link.from + '_' + link.to); // เปิดท่อให้สีน้ำเงิน
                    if (!nodesWithPrimaryGas.has(link.to)) {
                        nodesWithPrimaryGas.add(link.to);
                        let targetNode = nodesData.find(n => n.id === link.to);
                        if (targetNode && targetNode.status !== 'ปิด') {
                            targetNode.tempStatus = 'ปกติ';
                        }
                        queue.push(link.to);
                    }
                });
            }

            // Step 2: ตรวจสอบระบบสำรอง
            nodesData.filter(n => n.type === 'backup').forEach(backupNode => {
                let outgoingBackupLinks = linksData.filter(l => l.from === backupNode.id && l.line_type === 'backup');
                
                outgoingBackupLinks.forEach(link => {
                    // หากตึกปลายทาง ไม่ได้รับก๊าซจากระบบหลักเลย (ล่ม 100%)
                    if (!nodesWithPrimaryGas.has(link.to)) {
                        backupNode.tempStatus = '⚡ กำลังจ่ายก๊าซสำรอง'; // เปลี่ยนถังสำรองเป็นกำลังทำงาน
                        activeEdges.add(link.from + '_' + link.to);
                        
                        let targetNode = nodesData.find(n => n.id === link.to);
                        if (targetNode && targetNode.status !== 'ปิด') {
                            targetNode.tempStatus = '⚠️ ใช้ระบบก๊าซสำรอง'; 
                        }
                    }
                });
            });

            renderUpdate(nodesWithPrimaryGas, activeEdges);
        }

        // ฟังก์ชันวาดกราฟิก
        function renderUpdate(nodesWithPrimaryGas, activeEdges) {
            let visNodes = nodesData.map(n => {
                let displayStatus = n.tempStatus;
                
                // จุดนั้นจะมีก๊าซก็ต่อเมื่อ: มีก๊าซหลักส่งถึง OR เป็นถังสำรองกำลังจ่าย OR เป็น Source ที่เปิดอยู่
                let hasGas = nodesWithPrimaryGas.has(n.id) || displayStatus.includes('สำรอง') || displayStatus.includes('กำลังจ่าย') || (n.type === 'source' && n.status !== 'ปิด');
                
                let labelText = ``;

                if (n.type !== 'backup') {
                    // ทุกจุดที่มีปุ่มกด จะจัดข้อความแบบนี้ และเว้นที่ว่างให้ปุ่ม ( \n\n )
                    labelText = `📌 ${n.label}\n[ ${displayStatus} ]\n\n`; 
                } else {
                    // ถังสำรอง ไม่มีปุ่มกด
                    labelText = `🛢️ ${n.label}\n[ ${displayStatus} ]`;
                }

                let style = getNodeStyle(n.type, n.status, displayStatus, hasGas);
                
                return {
                    id: n.id,
                    label: labelText,
                    level: n.level,
                    shape: 'box',
                    margin: 12,
                    font: { face: 'Prompt', color: style.font, size: 15, multi: true },
                    color: { background: style.bg, border: style.border },
                    borderWidth: 2
                };
            });

            let visEdges = linksData.map(l => {
                let isActive = activeEdges.has(l.from + '_' + l.to);
                let isBackup = l.line_type === 'backup';
                let edgeColor = isActive ? (isBackup ? '#f97316' : '#3b82f6') : '#cbd5e1';
                
                return {
                    id: l.from + '_' + l.to,
                    from: l.from, to: l.to,
                    width: isActive ? 12 : 4,
                    color: { color: edgeColor, opacity: isActive ? 1 : 0.3 },
                    arrows: 'to',
                    dashes: isBackup,
                    smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.6 }
                };
            });

            nodesDataset.update(visNodes);
            edgesDataset.update(visEdges);
        }

        // ฟังก์ชันจัดการสี
        function getNodeStyle(type, physicalStatus, tempStatus, hasGas) {
            // 1. ถ้าผู้ใช้จงใจกด "ปิด" ด้วยตัวเอง (กล่องจะเป็นสีแดง)
            if (physicalStatus === 'ปิด' && type !== 'backup') {
                return { bg: '#fee2e2', font: '#991b1b', border: '#ef4444' };
            }
            // 2. ถ้าเป็นถังสำรอง
            if (type === 'backup') {
                if (tempStatus.includes('กำลังจ่าย')) {
                    return { bg: '#ffedd5', font: '#ea580c', border: '#f97316' }; // ส้ม (กำลังจ่าย)
                }
                return { bg: '#f1f5f9', font: '#475569', border: '#94a3b8' }; // เทา (Standby)
            }
            // 3. ถ้าไม่มีก๊าซไหลมาถึง (กล่องเป็นสีแดง แจ้งเตือน)
            if (!hasGas) {
                return { bg: '#ef4444', font: '#ffffff', border: '#7f1d1d' };
            }
            // 4. ถ้าตึกกำลังใช้ระบบสำรองหล่อเลี้ยงอยู่ (กล่องเป็นสีส้ม)
            if (tempStatus.includes('สำรอง')) {
                return { bg: '#ffedd5', font: '#ea580c', border: '#f97316' };
            }
            // 5. สถานะปกติ (Source สีฟ้า / ตึกและวาล์วสีเขียว)
            return type === 'source' 
                ? { bg: '#dbeafe', font: '#1e40af', border: '#3b82f6' } 
                : { bg: '#d1fae5', font: '#065f46', border: '#10b981' };
        }

        function saveImage() {
            const canvas = document.querySelector('#mynetwork canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `O2-Full-Simulation-${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        }

        window.onload = initDiagram;
    </script>
</body>
</html>
